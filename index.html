<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>AR Battlefield Overlay</title>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- VIDEO -->
  <video
    id="video"
    autoplay
    playsinline
  ></video>

  <!-- OVERLAY -->
  <canvas id="overlay"></canvas>

  <!-- FLOATING TOGGLE -->
  <button id="toggleControlsBtn">
    Ocultar UI
  </button>

  <!-- CONTROLS -->
  <div id="controls">

    <button id="startCameraBtn">
      Activar Cámara
    </button>

    <button id="generateBtn">
      Generar Marcadores
    </button>

    <button id="resetCornersBtn">
      Reset Esquinas
    </button>

    <div class="info">
      Arrastra las esquinas rojas para alinear la mesa.
    </div>

  </div>

  <script type="module" src="./js/app.js"></script>

</body>
</html>
